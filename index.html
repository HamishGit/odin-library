<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odin Library Project</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header>
        <h1>Library Display</h1>
    </header>
    <main>
        <dialog id="dialog">
            <form method="dialog" id="new-book-form">
                <ul>
                    <li>
                        <label for="title">Title</label>
                        <input type="text" id="title" name="title" required>
                    </li>
                    <li>
                        <label for="author">Author</label>
                        <input type="text" id="author" name="author" required>
                    </li>
                    <li>
                        <label for="num-pages">Number of Pages</label>
                        <input type="number" id="num-pages" name="num-pages" required>
                    </li>
                    <li>
                        <label for="has-been-read">Has It Been Read?</label>
                        <input type="checkbox" id="has-been-read" name="has-been-read">
                    </li>
                </ul>
                <section class="btn-container" id="cancel-btn-container">
                    <button type="button" id="cancel">Cancel</button>
                </section>
                <section class="btn-container" id="submit-btn-container">
                    <button id="new-book-submit-btn" value="submit">Create Book</button>
                </section>
            </form>
        </dialog>
        <button type="button" class="new-book-btn">New Book</button>
        <section id="cards">

        </section>
    </main>


    <script src="script.js"></script>
</body>

</html>
